<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Arena | Protótipo</title>
    <style>
        body {
            background-color: #0a0a19;
            color: #00d2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            border: 3px solid #0064ff;
            box-shadow: 0 0 20px #0064ff;
            background: #000;
        }
        .instructions {
            margin-top: 20px;
            text-align: center;
            background: rgba(0, 100, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🚀 Astro-Arena</h1>
    
    <div id="game-container">
        <!-- O Pygbag vai renderizar o canvas aqui quando você rodar o build -->
        <div id="status" style="padding: 20px;">
            <h3>Como jogar o teste local:</h3>
            <p>1. Abra o terminal na pasta do projeto.</p>
            <p>2. Digite: <code>python -m pygbag src/</code></p>
            <p>3. Abra o navegador em: <code>http://localhost:8000</code></p>
        </div>
    </div>

    <div class="instructions">
        <p><strong>Controles:</strong> WASD ou Setas para mover.</p>
        <p>A física de inércia e colisões elásticas já está ativa no <code>main.py</code>!</p>
    </div>

</body>
</html>
